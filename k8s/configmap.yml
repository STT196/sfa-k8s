apiVersion: v1
kind: ConfigMap
metadata:
  name: sfa-config
  namespace: sfa
data:
  APP_NAME: "Malindu Foods SFA"
  APP_ENV: "local"
  APP_DEBUG: "true"
  APP_URL: "http://sfa.local"

  LOG_CHANNEL: "stack"
  LOG_DEPRECATIONS_CHANNEL: "null"
  LOG_LEVEL: "debug"

  DB_CONNECTION: "mysql"
  DB_HOST: "mysql"
  DB_PORT: "3306"
  DB_DATABASE: "sfa_db"

  REDIS_HOST: "redis"
  REDIS_PORT: "6379"

  JWT_NEVER_EXPIRE: "true"
  JWT_NEVER_EXPIRE_TTL: "52560000"
  JWT_REFRESH_TTL: "20160"

  PRIVILEGE_CACHE_DRIVER: "redis"
  PRIVILEGE_CACHE_TTL: "86400"