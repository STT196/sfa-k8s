apiVersion: apps/v1
kind: Deployment
metadata:
  name: sfa-app
  namespace: sfa
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sfa-app
  template:
    metadata:
      labels:
        app: sfa-app
    spec:
      containers:
        - name: sfa-app
          image: sfa:latest
          imagePullPolicy: never
          ports:
            - containerPort: 80
          env:
            - name: APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: sfa-config
                  key: APP_NAME
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: sfa-config
                  key: APP_ENV
            - name: APP_DEBUG
              valueFrom:
                configMapKeyRef:
                  name: sfa-config
                  key: APP_DEBUG
            - name: APP_URL
              valueFrom:
                configMapKeyRef:
                  name: sfa-config
                  key: APP_URL

            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: sfa-secret
                  key: APP_KEY

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: sfa-secret
                  key: JWT_SECRET

            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: sfa-config
                  key: DB_HOST
            - name: DB_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: sfa-config
                  key: DB_DATABASE
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: sfa-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sfa-secret
                  key: DB_PASSWORD

            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: sfa-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: sfa-config
                  key: REDIS_PORT

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 5

---

apiVersion: v1
kind: Service
metadata:
  name: sfa-app
  namespace: sfa
spec:
  selector:
    app: sfa-app
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP